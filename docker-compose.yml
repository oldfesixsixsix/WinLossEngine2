services:
  winloss-tracker:
    build: .
    container_name: winloss_tracker
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./default:/app/data
      # Optional: Mount your customized defaults folder to override pre-installed assets directly from host
      # - ./defaults:/app/defaults
    environment:
      - NODE_ENV=production
